<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#fafafa">
<title>Иврит · живой разговор</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS CUSTOM PROPERTIES
   ============================================ */
@property --s1 { syntax: "<angle>"; inherits: false; initial-value: 0deg; }
@property --s2 { syntax: "<angle>"; inherits: false; initial-value: 0deg; }
@property --s3 { syntax: "<angle>"; inherits: false; initial-value: 0deg; }
@property --rotation { syntax: "<angle>"; inherits: false; initial-value: 0deg; }

@property --mesh-x-0 { syntax: "<percentage>"; inherits: false; initial-value: 85%; }
@property --mesh-y-0 { syntax: "<percentage>"; inherits: false; initial-value: 80%; }
@property --mesh-c-0 { syntax: "<color>"; inherits: false; initial-value: hsla(150.88, 62%, 73%, 1); }
@property --mesh-s-start-0 { syntax: "<percentage>"; inherits: false; initial-value: 9%; }
@property --mesh-s-end-0 { syntax: "<percentage>"; inherits: false; initial-value: 55%; }

@property --mesh-x-1 { syntax: "<percentage>"; inherits: false; initial-value: 60%; }
@property --mesh-y-1 { syntax: "<percentage>"; inherits: false; initial-value: 24%; }
@property --mesh-c-1 { syntax: "<color>"; inherits: false; initial-value: hsla(220, 100%, 72%, 1); }
@property --mesh-s-start-1 { syntax: "<percentage>"; inherits: false; initial-value: 5%; }
@property --mesh-s-end-1 { syntax: "<percentage>"; inherits: false; initial-value: 72%; }

@property --mesh-x-2 { syntax: "<percentage>"; inherits: false; initial-value: 13%; }
@property --mesh-y-2 { syntax: "<percentage>"; inherits: false; initial-value: 82%; }
@property --mesh-c-2 { syntax: "<color>"; inherits: false; initial-value: hsla(297.79, 100%, 55%, 0.49); }
@property --mesh-s-start-2 { syntax: "<percentage>"; inherits: false; initial-value: 5%; }
@property --mesh-s-end-2 { syntax: "<percentage>"; inherits: false; initial-value: 52%; }

@property --mesh-x-3 { syntax: "<percentage>"; inherits: false; initial-value: 24%; }
@property --mesh-y-3 { syntax: "<percentage>"; inherits: false; initial-value: 7%; }
@property --mesh-c-3 { syntax: "<color>"; inherits: false; initial-value: hsla(182, 72%, 68%, 1); }
@property --mesh-s-start-3 { syntax: "<percentage>"; inherits: false; initial-value: 13%; }
@property --mesh-s-end-3 { syntax: "<percentage>"; inherits: false; initial-value: 68%; }

/* ============================================
   BASE
   ============================================ */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  min-height: 100dvh;
  width: 100%;
  background: #fafafa;
  color: #0b0b0b;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  overflow-x: hidden;
  overscroll-behavior: none;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 20px calc(24px + env(safe-area-inset-bottom));
  padding-top: calc(14px + env(safe-area-inset-top));
}

/* ============================================
   ANIMATIONS
   ============================================ */
@keyframes s1 { to { --s1: 360deg; } }
@keyframes s2 { to { --s2: 360deg; } }
@keyframes s3 { to { --s3: 360deg; } }
@keyframes rotation { to { --rotation: 360deg; } }

@keyframes mesh-gradient {
  0% {
    --mesh-x-0: 85%; --mesh-y-0: 80%;
    --mesh-c-1: hsla(220, 100%, 82%, 1);
    --mesh-x-1: 60%; --mesh-y-1: 24%;
    --mesh-x-2: 13%; --mesh-y-2: 82%;
    --mesh-x-3: 24%; --mesh-y-3: 7%;
  }
  100% {
    --mesh-x-0: 31%; --mesh-y-0: 94%;
    --mesh-c-1: hsla(220, 82%, 95%, 1);
    --mesh-x-1: 2%; --mesh-y-1: 25%;
    --mesh-x-2: 98%; --mesh-y-2: 20%;
    --mesh-x-3: 95%; --mesh-y-3: 92%;
  }
}

@keyframes grain-jitter {
  0%{transform:translate(1px,6px)}3.33%{transform:translate(-12px,8px)}6.67%{transform:translate(15px,-10px)}
  10%{transform:translate(-8px,14px)}13.33%{transform:translate(11px,-6px)}16.67%{transform:translate(-14px,-9px)}
  20%{transform:translate(9px,13px)}23.33%{transform:translate(-7px,-15px)}26.67%{transform:translate(13px,7px)}
  30%{transform:translate(-10px,-11px)}33.33%{transform:translate(6px,-8px)}36.67%{transform:translate(-15px,12px)}
  40%{transform:translate(14px,-7px)}43.33%{transform:translate(-9px,15px)}46.67%{transform:translate(8px,-13px)}
  50%{transform:translate(-13px,-6px)}53.33%{transform:translate(12px,10px)}56.67%{transform:translate(-6px,-14px)}
  60%{transform:translate(10px,9px)}63.33%{transform:translate(-11px,-12px)}66.67%{transform:translate(7px,14px)}
  70%{transform:translate(-14px,-8px)}73.33%{transform:translate(15px,11px)}76.67%{transform:translate(-8px,-15px)}
  80%{transform:translate(9px,6px)}83.33%{transform:translate(-12px,-10px)}86.67%{transform:translate(13px,15px)}
  90%{transform:translate(-10px,7px)}93.33%{transform:translate(11px,-14px)}96.67%{transform:translate(-7px,13px)}
  100%{transform:translate(14px,-9px)}
}

@keyframes pulse-ring {
  0% { transform: scale(1); opacity: .5; }
  100% { transform: scale(1.8); opacity: 0; }
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fade {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* ============================================
   TOP BAR
   ============================================ */
.topbar {
  width: 100%;
  max-width: 440px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  animation: fade .6s ease both;
}
.brand {
  font-family: 'Frank Ruhl Libre', serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -.01em;
  color: #0b0b0b;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.brand .he { font-size: 22px; direction: rtl; }
.brand .dot { width: 4px; height: 4px; border-radius: 50%; background: #0b0b0b; opacity: .4; align-self: center; }
.topbar-right { display: flex; gap: 12px; align-items: center; font-size: 13px; color: #6a6a6a; font-variant-numeric: tabular-nums; }
.topbar-right .stat { display: flex; align-items: center; gap: 4px; }

/* ============================================
   BLOB
   ============================================ */
.blob-wrapper {
  position: relative;
  filter: url(#glow);
  margin: 16px 0 10px;
}
#filter-toggle:checked ~ .app .blob-wrapper {
  filter: url(#edge-displacement) url(#glow);
}
.blob {
  aspect-ratio: 1;
  width: min(300px, 70vw);
  overflow: hidden;
  position: relative;

  background-color: hsla(358, 0%, 100%, 1);
  background-image:
    radial-gradient(circle at var(--mesh-x-0) var(--mesh-y-0), var(--mesh-c-0) var(--mesh-s-start-0), transparent var(--mesh-s-end-0)),
    radial-gradient(circle at var(--mesh-x-1) var(--mesh-y-1), var(--mesh-c-1) var(--mesh-s-start-1), transparent var(--mesh-s-end-1)),
    radial-gradient(circle at var(--mesh-x-2) var(--mesh-y-2), var(--mesh-c-2) var(--mesh-s-start-2), transparent var(--mesh-s-end-2)),
    radial-gradient(circle at var(--mesh-x-3) var(--mesh-y-3), var(--mesh-c-3) var(--mesh-s-start-3), transparent var(--mesh-s-end-3));

  --depth: 0.3;
  --rotation: 0deg;

  animation:
    s1 7s linear infinite,
    s2 11s linear infinite,
    s3 13s linear infinite,
    mesh-gradient 10s linear infinite alternate;
  cursor: pointer;
}

.blob-shape {
  --angle0: 0deg;    --p1-0: 0deg;     --p2-0: 0deg;     --p3-0: 0deg;
  --angle1: 51.43deg;--p1-1: 137.5deg; --p2-1: 222.5deg; --p3-1: 360.1deg;
  --angle2: 102.86deg;--p1-2: 275deg;  --p2-2: 85deg;    --p3-2: 80.2deg;
  --angle3: 154.29deg;--p1-3: 52.5deg; --p2-3: 307.5deg; --p3-3: 200.3deg;
  --angle4: 205.71deg;--p1-4: 190deg;  --p2-4: 170deg;   --p3-4: 320.4deg;
  --angle5: 257.14deg;--p1-5: 327.5deg;--p2-5: 32.5deg;  --p3-5: 80.5deg;
  --angle6: 308.57deg;--p1-6: 105deg;  --p2-6: 255deg;   --p3-6: 200.6deg;

  --rand0: calc(0.5 + 0.5 * (0.5 * sin(var(--s1) + var(--p1-0)) + 0.3 * sin(var(--s2) + var(--p2-0)) + 0.2 * sin(var(--s3) + var(--p3-0))));
  --d0: calc(50 * (1 - var(--depth)) + 50 * var(--rand0) * var(--depth));
  --x0: calc((50 + var(--d0) * cos(var(--rotation) + var(--angle0))) * 1%);
  --y0: calc((50 + var(--d0) * sin(var(--rotation) + var(--angle0))) * 1%);

  --rand1: calc(0.5 + 0.5 * (0.5 * sin(var(--s1) + var(--p1-1)) + 0.3 * sin(var(--s2) + var(--p2-1)) + 0.2 * sin(var(--s3) + var(--p3-1))));
  --d1: calc(50 * (1 - var(--depth)) + 50 * var(--rand1) * var(--depth));
  --x1: calc((50 + var(--d1) * cos(var(--rotation) + var(--angle1))) * 1%);
  --y1: calc((50 + var(--d1) * sin(var(--rotation) + var(--angle1))) * 1%);

  --rand2: calc(0.5 + 0.5 * (0.5 * sin(var(--s1) + var(--p1-2)) + 0.3 * sin(var(--s2) + var(--p2-2)) + 0.2 * sin(var(--s3) + var(--p3-2))));
  --d2: calc(50 * (1 - var(--depth)) + 50 * var(--rand2) * var(--depth));
  --x2: calc((50 + var(--d2) * cos(var(--rotation) + var(--angle2))) * 1%);
  --y2: calc((50 + var(--d2) * sin(var(--rotation) + var(--angle2))) * 1%);

  --rand3: calc(0.5 + 0.5 * (0.5 * sin(var(--s1) + var(--p1-3)) + 0.3 * sin(var(--s2) + var(--p2-3)) + 0.2 * sin(var(--s3) + var(--p3-3))));
  --d3: calc(50 * (1 - var(--depth)) + 50 * var(--rand3) * var(--depth));
  --x3: calc((50 + var(--d3) * cos(var(--rotation) + var(--angle3))) * 1%);
  --y3: calc((50 + var(--d3) * sin(var(--rotation) + var(--angle3))) * 1%);

  --rand4: calc(0.5 + 0.5 * (0.5 * sin(var(--s1) + var(--p1-4)) + 0.3 * sin(var(--s2) + var(--p2-4)) + 0.2 * sin(var(--s3) + var(--p3-4))));
  --d4: calc(50 * (1 - var(--depth)) + 50 * var(--rand4) * var(--depth));
  --x4: calc((50 + var(--d4) * cos(var(--rotation) + var(--angle4))) * 1%);
  --y4: calc((50 + var(--d4) * sin(var(--rotation) + var(--angle4))) * 1%);

  --rand5: calc(0.5 + 0.5 * (0.5 * sin(var(--s1) + var(--p1-5)) + 0.3 * sin(var(--s2) + var(--p2-5)) + 0.2 * sin(var(--s3) + var(--p3-5))));
  --d5: calc(50 * (1 - var(--depth)) + 50 * var(--rand5) * var(--depth));
  --x5: calc((50 + var(--d5) * cos(var(--rotation) + var(--angle5))) * 1%);
  --y5: calc((50 + var(--d5) * sin(var(--rotation) + var(--angle5))) * 1%);

  --rand6: calc(0.5 + 0.5 * (0.5 * sin(var(--s1) + var(--p1-6)) + 0.3 * sin(var(--s2) + var(--p2-6)) + 0.2 * sin(var(--s3) + var(--p3-6))));
  --d6: calc(50 * (1 - var(--depth)) + 50 * var(--rand6) * var(--depth));
  --x6: calc((50 + var(--d6) * cos(var(--rotation) + var(--angle6))) * 1%);
  --y6: calc((50 + var(--d6) * sin(var(--rotation) + var(--angle6))) * 1%);

  --mx0: calc((var(--x0) + var(--x1)) / 2); --my0: calc((var(--y0) + var(--y1)) / 2);
  --mx1: calc((var(--x1) + var(--x2)) / 2); --my1: calc((var(--y1) + var(--y2)) / 2);
  --mx2: calc((var(--x2) + var(--x3)) / 2); --my2: calc((var(--y2) + var(--y3)) / 2);
  --mx3: calc((var(--x3) + var(--x4)) / 2); --my3: calc((var(--y3) + var(--y4)) / 2);
  --mx4: calc((var(--x4) + var(--x5)) / 2); --my4: calc((var(--y4) + var(--y5)) / 2);
  --mx5: calc((var(--x5) + var(--x6)) / 2); --my5: calc((var(--y5) + var(--y6)) / 2);
  --mx6: calc((var(--x6) + var(--x0)) / 2); --my6: calc((var(--y6) + var(--y0)) / 2);

  clip-path: circle(50%);
  transform: scale(calc(0.5 + var(--depth) * 0.5));
}

@supports (clip-path: shape(from 0% 0%, move to 100% 100%)) {
  #shape-toggle:checked ~ .app .blob-shape {
    clip-path: content-box shape(
      from var(--mx6) var(--my6),
      curve to var(--mx0) var(--my0) with var(--x0) var(--y0),
      curve to var(--mx1) var(--my1) with var(--x1) var(--y1),
      curve to var(--mx2) var(--my2) with var(--x2) var(--y2),
      curve to var(--mx3) var(--my3) with var(--x3) var(--y3),
      curve to var(--mx4) var(--my4) with var(--x4) var(--y4),
      curve to var(--mx5) var(--my5) with var(--x5) var(--y5),
      curve to var(--mx6) var(--my6) with var(--x6) var(--y6)
    );
    border-radius: 0;
    transform: scale(calc(1 + var(--depth)));
  }
}

.grain-overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: white;
  filter: url(#filmGrain);
  mix-blend-mode: multiply;
  opacity: 0;
  animation: grain-jitter 1s infinite steps(1);
}
#grain-toggle:checked ~ .app .grain-overlay { opacity: 0.4; }

@-moz-document url-prefix() {
  .blob-wrapper { filter: none; }
  .grain-overlay { filter: none; }
}

.pulse-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid rgba(214,59,59,.35);
  pointer-events: none; opacity: 0;
}
.blob-wrapper.listening .pulse-ring {
  opacity: 1;
  animation: pulse-ring 1.3s ease-out infinite;
}
.blob-wrapper.listening .pulse-ring.r2 { animation-delay: .4s; }
.blob-wrapper.listening .pulse-ring.r3 { animation-delay: .8s; }

/* ============================================
   STATUS + TRANSCRIPT
   ============================================ */
.status {
  text-align: center;
  font-size: 13px;
  color: #6a6a6a;
  min-height: 18px;
  margin: 4px 0 14px;
  letter-spacing: -.005em;
  transition: color .25s;
}
.status.active { color: #0b0b0b; }

.transcript {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
}
.bubble {
  padding: 14px 16px;
  border-radius: 18px;
  animation: fade-up .35s ease both;
  word-break: break-word;
}
.bubble.you {
  background: #f0f0f0;
  color: #0b0b0b;
  align-self: flex-end;
  max-width: 80%;
  font-size: 15px;
  border-bottom-right-radius: 4px;
}
.bubble.reply {
  background: #0b0b0b;
  color: #fff;
  align-self: flex-start;
  max-width: 94%;
  border-bottom-left-radius: 4px;
  display: flex; flex-direction: column; gap: 8px;
}
.bubble.reply .he {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 24px;
  line-height: 1.25;
  direction: rtl;
  font-weight: 500;
}
.bubble.reply .tr {
  font-size: 13px;
  opacity: .6;
  font-style: italic;
  letter-spacing: -.01em;
}
.bubble.reply .ru {
  font-size: 15px;
  opacity: .95;
  line-height: 1.35;
}
.bubble.reply .hint {
  font-size: 12px;
  opacity: .7;
  padding: 8px 10px;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 10px;
  margin-top: 2px;
  line-height: 1.4;
}
.bubble.reply .hint:empty { display: none; }
.bubble.reply .replay {
  align-self: flex-end;
  background: rgba(255,255,255,.12);
  border: 0;
  color: #fff;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
}
.bubble.reply .replay:hover { background: rgba(255,255,255,.22); }

/* ============================================
   CONTROLS
   ============================================ */
.controls-row {
  width: 100%;
  max-width: 440px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-top: 4px;
}

.mic-btn {
  width: 76px; height: 76px; border-radius: 50%;
  border: 0; background: #0b0b0b; color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform .2s ease, background .25s;
  font-family: inherit;
  box-shadow: 0 6px 20px rgba(0,0,0,.18);
}
.mic-btn svg { width: 30px; height: 30px; }
.mic-btn:hover { transform: scale(1.04); }
.mic-btn:active { transform: scale(.94); }
.mic-btn.listening { background: #d63b3b; }
.mic-btn.busy { opacity: .5; pointer-events: none; }

.icon-btn {
  width: 46px; height: 46px; border-radius: 50%;
  border: 0; background: #f0f0f0; color: #0b0b0b;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform .2s, background .25s;
  font-family: inherit;
}
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn:hover { background: #e4e4e4; transform: scale(1.05); }
.icon-btn:active { transform: scale(.92); }

.lang-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin: 12px 0 6px;
}
.lang-chip {
  font-size: 11px;
  padding: 6px 12px;
  background: #f0f0f0;
  color: #6a6a6a;
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: .02em;
  font-weight: 500;
  transition: all .25s;
}
.lang-chip.active { background: #0b0b0b; color: #fff; }

.type-bar {
  width: 100%;
  max-width: 440px;
  display: flex;
  gap: 8px;
  margin-top: 14px;
}
.type-bar input {
  flex: 1;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid #e4e4e4;
  background: #fff;
  font-family: inherit;
  font-size: 15px;
  color: #0b0b0b;
  outline: none;
  transition: border-color .2s;
}
.type-bar input:focus { border-color: #0b0b0b; }
.type-bar button {
  width: 46px; height: 46px; border-radius: 50%;
  border: 0; background: #0b0b0b; color: #fff;
  cursor: pointer; font-size: 18px; font-family: inherit;
}
.type-bar[hidden] { display: none; }

input[type="checkbox"][id$="-toggle"] {
  position: absolute; opacity: 0; pointer-events: none; left: -9999px;
}

.app {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 440px;
}

.hint-below {
  font-size: 12px;
  color: #9a9a9a;
  text-align: center;
  max-width: 300px;
  line-height: 1.45;
  margin-top: 10px;
}

.footer {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.footer button {
  font-size: 11.5px;
  letter-spacing: .02em;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid #e4e4e4;
  background: transparent;
  color: #6a6a6a;
  cursor: pointer;
  font-family: inherit;
}
.footer button:hover { color: #0b0b0b; border-color: #c0c0c0; }

.shake { animation: shake .3s ease; }

@media (max-width: 360px) {
  .mic-btn { width: 66px; height: 66px; }
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <filter id="filmGrain">
    <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="4" seed="42" result="noise" />
    <feColorMatrix in="noise" type="saturate" values="0" result="desaturatedNoise" />
    <feComponentTransfer in="desaturatedNoise" result="grain">
      <feFuncA type="discrete" tableValues="0 0 0 1 1" />
    </feComponentTransfer>
  </filter>
  <filter id="edge-displacement">
    <feTurbulence type="fractalNoise" baseFrequency="1" numOctaves="1" />
    <feDisplacementMap in="SourceGraphic" scale="50" />
  </filter>
  <filter id="glow" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="50" result="blurred" />
    <feComponentTransfer in="blurred" result="brighterGlow">
      <feFuncA type="linear" slope="0.8" />
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="brighterGlow" />
      <feMergeNode in="SourceGraphic" />
    </feMerge>
  </filter>
</svg>

<input id="filter-toggle" type="checkbox" checked>
<input id="grain-toggle" type="checkbox" checked>
<input id="shape-toggle" type="checkbox" checked>

<div class="app">

  <div class="topbar">
    <div class="brand">
      <span class="he">עִבְרִית</span>
      <span class="dot"></span>
      <span>живой разговор</span>
    </div>
    <div class="topbar-right">
      <span class="stat">🔥 <span id="streak">0</span></span>
      <span class="stat" title="реплик">💬 <span id="turns-stat">0</span></span>
    </div>
  </div>

  <div class="blob-wrapper" id="blobWrap">
    <div class="pulse-ring r1"></div>
    <div class="pulse-ring r2"></div>
    <div class="pulse-ring r3"></div>
    <div class="blob blob-shape" id="blob">
      <div class="grain-overlay"></div>
    </div>
  </div>

  <div class="status" id="status">Нажмите микрофон и говорите на иврите или русском</div>

  <div class="transcript" id="transcript"></div>

  <div class="lang-row">
    <button class="lang-chip active" data-lang="he-IL" id="lang-he">🇮🇱 עברית</button>
    <button class="lang-chip" data-lang="ru-RU" id="lang-ru">🇷🇺 русский</button>
  </div>

  <div class="controls-row">
    <button class="icon-btn" id="typeBtn" aria-label="Печатать" title="Печатать">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M7 10h.01M11 10h.01M15 10h.01M7 14h10"/></svg>
    </button>
    <button class="mic-btn" id="micBtn" aria-label="Говорить">
      <svg id="micIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z"/><path d="M19 10v2a7 7 0 01-14 0v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <svg id="stopIcon" style="display:none" viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="7" width="10" height="10" rx="2"/></svg>
    </button>
    <button class="icon-btn" id="resetBtn" aria-label="Новый разговор" title="Новый разговор">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
    </button>
  </div>

  <div class="type-bar" id="typeBar" hidden>
    <input id="typeInput" type="text" placeholder="Напишите на русском или иврите…" autocomplete="off" />
    <button id="typeSend" aria-label="Отправить">→</button>
  </div>

  <div class="hint-below">Говорите свободно. ИИ отвечает на иврите с переводом и подсказкой.</div>

  <div class="footer">
    <button id="shareBtn">🔥 Поделиться</button>
    <button id="proBtn">⭐ PRO · безлимит</button>
  </div>
</div>

<audio id="audioPlayer" style="display:none" crossorigin="anonymous"></audio>

<script>
'use strict';

const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();
try { tg?.enableClosingConfirmation(); } catch {}
try { tg?.setHeaderColor('#fafafa'); tg?.setBackgroundColor('#fafafa'); tg?.setBottomBarColor?.('#fafafa'); } catch {}
try { tg?.disableVerticalSwipes?.(); } catch {}

const haptic = (t) => {
  try {
    if (t === 'error' || t === 'warning' || t === 'success') tg?.HapticFeedback?.notificationOccurred(t);
    else tg?.HapticFeedback?.impactOccurred(t || 'light');
  } catch {}
};

const store = {
  get: (k) => new Promise((resolve) => {
    if (tg?.CloudStorage) tg.CloudStorage.getItem(k, (_e, v) => resolve(v ?? localStorage.getItem(k)));
    else resolve(localStorage.getItem(k));
  }),
  set: (k, v) => {
    try { tg?.CloudStorage?.setItem(k, String(v)); } catch {}
    try { localStorage.setItem(k, String(v)); } catch {}
  }
};

const state = {
  mode: 'idle',
  inputLang: 'he-IL',
  history: [],
  streak: 0,
  turns: 0,
  lastActive: null
};

const el = (id) => document.getElementById(id);
const blob = el('blob');
const blobWrap = el('blobWrap');
const statusEl = el('status');
const transcriptEl = el('transcript');
const streakEl = el('streak');
const turnsStat = el('turns-stat');
const micBtn = el('micBtn');
const micIcon = el('micIcon');
const stopIcon = el('stopIcon');
const typeBtn = el('typeBtn');
const typeBar = el('typeBar');
const typeInput = el('typeInput');
const typeSend = el('typeSend');
const resetBtn = el('resetBtn');
const shareBtn = el('shareBtn');
const proBtn = el('proBtn');
const langHe = el('lang-he');
const langRu = el('lang-ru');
const audioPlayer = el('audioPlayer');

function setStatus(text, active = false) {
  statusEl.textContent = text;
  statusEl.classList.toggle('active', active);
}

// ============ AUDIO (shared ctx) ============
let audioCtx = null;
let analyser = null;
let dataArr = null;
let micStreamSource = null;
let ttsSource = null;
let depthValue = 0.3;
let smoothedDepth = 0.3;
let prevEnergy = 0;
let smoothedEnergy = 0;

async function ensureAudio() {
  if (audioCtx) { try { await audioCtx.resume(); } catch {} return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArr = new Uint8Array(analyser.frequencyBinCount);
  try {
    ttsSource = audioCtx.createMediaElementSource(audioPlayer);
    ttsSource.connect(analyser);
    analyser.connect(audioCtx.destination);
  } catch (e) { console.warn('tts source', e); }
  requestAnimationFrame(pumpDepth);
}

async function ensureMic() {
  await ensureAudio();
  if (micStreamSource) return true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    micStreamSource = audioCtx.createMediaStreamSource(stream);
    return true;
  } catch (e) {
    console.warn('mic denied', e);
    return false;
  }
}

function pumpDepth() {
  if (analyser && dataArr) {
    analyser.getByteTimeDomainData(dataArr);
    let sum = 0;
    for (let i = 0; i < dataArr.length; i++) {
      const n = (dataArr[i] - 128) / 128;
      sum += n * n;
    }
    const rms = Math.sqrt(sum / dataArr.length);
    smoothedEnergy += (rms - smoothedEnergy) * 0.3;
    const delta = smoothedEnergy - prevEnergy;
    prevEnergy = smoothedEnergy;
    if (delta > 0.012) depthValue = Math.min(1.0, depthValue + delta * 4.5);
    depthValue = 0.3 + (depthValue - 0.3) * 0.92;
    smoothedDepth += (depthValue - smoothedDepth) * 0.5;
    blob.style.setProperty('--depth', smoothedDepth.toFixed(3));
  }
  requestAnimationFrame(pumpDepth);
}

function connectMicToAnalyser() {
  if (!micStreamSource || !analyser) return;
  try { micStreamSource.disconnect(); } catch {}
  try { micStreamSource.connect(analyser); } catch {}
}
function disconnectMic() {
  if (!micStreamSource) return;
  try { micStreamSource.disconnect(); } catch {}
}

// ============ RECOGNITION ============
let recognition = null;

function buildRecognition(lang) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = lang;
  r.interimResults = false;
  r.continuous = false;
  r.maxAlternatives = 1;
  return r;
}

async function startListening() {
  if (state.mode !== 'idle') return;
  await ensureAudio();
  const micOK = await ensureMic();
  if (!micOK) {
    setStatus('Микрофон недоступен — печатайте', false);
    openType();
    haptic('warning');
    return;
  }

  const sr = buildRecognition(state.inputLang);
  if (!sr) {
    setStatus('Голосовой ввод недоступен — печатайте', true);
    openType();
    haptic('warning');
    return;
  }

  recognition = sr;
  state.mode = 'listening';
  blobWrap.classList.add('listening');
  micBtn.classList.add('listening');
  micIcon.style.display = 'none';
  stopIcon.style.display = 'block';
  setStatus(state.inputLang === 'he-IL' ? 'слушаю иврит…' : 'слушаю…', true);
  connectMicToAnalyser();
  haptic('light');

  sr.onresult = (e) => {
    const t = e.results[0]?.[0]?.transcript;
    if (t && t.trim()) handleUserSaid(t.trim());
  };
  sr.onerror = (e) => {
    console.warn('sr error', e.error);
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      setStatus('Микрофон заблокирован — печатайте');
      openType();
    } else if (e.error === 'no-speech') {
      setStatus('Я не услышал. Нажмите ещё раз.');
    } else {
      setStatus('Ошибка: ' + e.error);
    }
    stopListening();
  };
  sr.onend = () => { if (state.mode === 'listening') stopListening(); };

  try { sr.start(); }
  catch (e) { console.warn('sr start', e); stopListening(); }
}

function stopListening() {
  try { recognition?.stop(); } catch {}
  recognition = null;
  blobWrap.classList.remove('listening');
  micBtn.classList.remove('listening');
  micIcon.style.display = 'block';
  stopIcon.style.display = 'none';
  disconnectMic();
  if (state.mode === 'listening') {
    state.mode = 'idle';
    setStatus('Нажмите микрофон чтобы продолжить');
  }
}

// ============ TRANSCRIPT ============
function pushYouBubble(text) {
  const div = document.createElement('div');
  div.className = 'bubble you';
  div.textContent = text;
  transcriptEl.appendChild(div);
  scrollIntoView();
}

function pushReplyBubble(data) {
  const div = document.createElement('div');
  div.className = 'bubble reply';
  const he = document.createElement('div'); he.className = 'he'; he.textContent = data.niqqud || data.he || '';
  const tr = document.createElement('div'); tr.className = 'tr'; tr.textContent = data.tr || '';
  const ru = document.createElement('div'); ru.className = 'ru'; ru.textContent = data.ru || '';
  const hint = document.createElement('div'); hint.className = 'hint'; hint.textContent = data.hint || '';
  const replay = document.createElement('button'); replay.className = 'replay'; replay.textContent = '🔊 ещё раз';
  replay.addEventListener('click', () => speakText(data.he || data.niqqud));
  div.append(he, tr, ru, hint, replay);
  transcriptEl.appendChild(div);
  scrollIntoView();
}

function scrollIntoView() {
  requestAnimationFrame(() => {
    transcriptEl.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'end' });
  });
}

// ============ CONVERSATION ============
const MAX_HISTORY = 30;

async function handleUserSaid(text) {
  stopListening();
  pushYouBubble(text);
  state.history.push({ role: 'user', content: text });
  state.mode = 'thinking';
  setStatus('думаю…', true);
  micBtn.classList.add('busy');

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: state.history.slice(-MAX_HISTORY) })
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'chat failed');

    const reply = {
      he: data.he || '',
      niqqud: data.niqqud || data.he || '',
      tr: data.tr || '',
      ru: data.ru || '',
      hint: data.hint || ''
    };
    state.history.push({ role: 'assistant', content: JSON.stringify(reply) });
    pushReplyBubble(reply);

    state.turns++;
    turnsStat.textContent = state.turns;
    store.set('blob_turns', state.turns);
    store.set('blob_history', JSON.stringify(state.history.slice(-MAX_HISTORY)));
    bumpStreak();

    await speakText(reply.he || reply.niqqud);

    state.mode = 'idle';
    micBtn.classList.remove('busy');
    setStatus('Нажмите микрофон чтобы ответить');
    haptic('success');

    if (state.turns === 5 || state.turns === 20 || state.turns === 50) {
      try { tg?.setEmojiStatus?.('🔥'); } catch {}
    }
  } catch (e) {
    console.error(e);
    state.mode = 'idle';
    micBtn.classList.remove('busy');
    micBtn.classList.add('shake');
    setTimeout(() => micBtn.classList.remove('shake'), 400);
    setStatus('Ошибка. Попробуйте ещё раз.');
    haptic('error');
  }
}

// ============ TTS ============
async function speakText(text) {
  if (!text) return;
  await ensureAudio();
  state.mode = 'speaking';
  setStatus('говорю…', true);
  disconnectMic();

  try {
    const r = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!r.ok) throw new Error('tts failed ' + r.status);
    const audioBlob = await r.blob();
    const url = URL.createObjectURL(audioBlob);
    audioPlayer.src = url;
    try { await audioCtx.resume(); } catch {}
    await audioPlayer.play();
    await new Promise((resolve) => {
      const done = () => { audioPlayer.onended = null; audioPlayer.onerror = null; resolve(); };
      audioPlayer.onended = done;
      audioPlayer.onerror = done;
    });
    URL.revokeObjectURL(url);
  } catch (e) {
    console.warn('tts fallback', e);
    fallbackBrowserTTS(text);
    await new Promise((resolve) => setTimeout(resolve, Math.max(1200, text.length * 70)));
  }
}

function fallbackBrowserTTS(text) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'he-IL';
    u.rate = 0.92;
    speechSynthesis.speak(u);
  } catch {}
}

// ============ STREAK ============
function bumpStreak() {
  const today = new Date().toISOString().slice(0, 10);
  if (state.lastActive === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  state.streak = state.lastActive === yesterday ? (state.streak + 1) : 1;
  state.lastActive = today;
  streakEl.textContent = state.streak;
  store.set('blob_streak', state.streak);
  store.set('blob_lastActive', today);
}

// ============ UI WIRES ============
langHe.addEventListener('click', () => { state.inputLang = 'he-IL'; langHe.classList.add('active'); langRu.classList.remove('active'); store.set('blob_lang', 'he-IL'); haptic('light'); });
langRu.addEventListener('click', () => { state.inputLang = 'ru-RU'; langRu.classList.add('active'); langHe.classList.remove('active'); store.set('blob_lang', 'ru-RU'); haptic('light'); });

micBtn.addEventListener('click', () => {
  if (state.mode === 'listening') stopListening();
  else if (state.mode === 'idle') startListening();
});

function openType() { typeBar.hidden = false; typeInput.focus(); }
function closeType() { typeBar.hidden = true; typeInput.value = ''; }
typeBtn.addEventListener('click', () => { if (typeBar.hidden) openType(); else closeType(); });
typeSend.addEventListener('click', sendTyped);
typeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendTyped(); });
async function sendTyped() {
  const t = typeInput.value.trim();
  if (!t || state.mode !== 'idle') return;
  typeInput.value = '';
  await ensureAudio();
  handleUserSaid(t);
}

resetBtn.addEventListener('click', () => {
  if (tg?.showConfirm) tg.showConfirm('Начать новый разговор?', (ok) => ok && doReset());
  else if (confirm('Начать новый разговор?')) doReset();
});
function doReset() {
  state.history = [];
  transcriptEl.innerHTML = '';
  store.set('blob_history', '[]');
  setStatus('Новый разговор. Скажите шалом!');
  haptic('light');
}

shareBtn.addEventListener('click', () => {
  const text = `Учу иврит с живым собеседником · ${state.streak}🔥 · @Goldberg2bot`;
  try {
    if (tg?.switchInlineQuery) tg.switchInlineQuery(text, ['users', 'groups']);
    else if (navigator.share) navigator.share({ text });
    else navigator.clipboard.writeText(text);
    haptic('success');
  } catch {}
});

proBtn.addEventListener('click', async () => {
  haptic('light');
  try {
    const userId = tg?.initDataUnsafe?.user?.id || 'anon';
    const r = await fetch('/api/invoice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: 'Иврит PRO',
        description: 'Безлимит разговоров · расширенный словарь · приоритетный голос',
        amount: 150,
        user_id: userId
      })
    });
    const data = await r.json();
    if (data.ok && data.invoice_url) {
      tg?.openInvoice(data.invoice_url, (status) => {
        if (status === 'paid') { haptic('success'); setStatus('⭐ PRO активирован!'); }
      });
    }
  } catch (e) { console.warn(e); }
});

try {
  tg?.MainButton?.setParams({ text: 'Начать разговор 🎤', color: '#0b0b0b', text_color: '#ffffff' });
  tg?.MainButton?.show?.();
  tg?.MainButton?.onClick?.(() => { if (state.mode === 'idle') startListening(); });
} catch {}

// ============ INIT ============
(async function init() {
  const [h, s, t, la, lng] = await Promise.all([
    store.get('blob_history'),
    store.get('blob_streak'),
    store.get('blob_turns'),
    store.get('blob_lastActive'),
    store.get('blob_lang')
  ]);
  if (h) { try { state.history = JSON.parse(h); } catch {} }
  state.streak = parseInt(s, 10) || 0;
  state.turns = parseInt(t, 10) || 0;
  state.lastActive = la || null;
  state.inputLang = lng || 'he-IL';
  streakEl.textContent = state.streak;
  turnsStat.textContent = state.turns;
  if (state.inputLang === 'ru-RU') { langRu.classList.add('active'); langHe.classList.remove('active'); }

  if (state.history.length >= 2) {
    const lastUser = [...state.history].reverse().find(m => m.role === 'user');
    const lastAsst = [...state.history].reverse().find(m => m.role === 'assistant');
    if (lastUser) pushYouBubble(lastUser.content);
    if (lastAsst) { try { pushReplyBubble(JSON.parse(lastAsst.content)); } catch {} }
  }

  requestAnimationFrame(() => {
    const anims = blob.getAnimations();
    const hoverIn = () => anims.forEach(a => a.playbackRate = 2.5);
    const hoverOut = () => anims.forEach(a => a.playbackRate = 1);
    blob.addEventListener('mouseenter', hoverIn);
    blob.addEventListener('mouseleave', hoverOut);
    blob.addEventListener('click', async () => {
      const lastAsst = [...state.history].reverse().find(m => m.role === 'assistant');
      if (lastAsst && state.mode === 'idle') {
        try { const r = JSON.parse(lastAsst.content); await speakText(r.he || r.niqqud); } catch {}
      }
    });
  });
})();

window.addEventListener('unhandledrejection', (e) => console.warn('unhandled', e.reason));
</script>
