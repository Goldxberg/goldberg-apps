<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>abc — Learning English</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#fff;--ink:#0a0a0a;--muted:#8a8a8a;--card:#f2f2f4;--line:#ececee;--chip:rgba(0,0,0,.06)}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100dvh;padding:env(safe-area-inset-top) 0 calc(64px + env(safe-area-inset-bottom))}
  .app{max-width:480px;margin:0 auto;padding:10px 20px 24px}
  .head{display:flex;align-items:center;justify-content:space-between;padding:14px 2px 18px}
  .title{font-size:34px;font-weight:700;letter-spacing:-.02em;line-height:1}
  .add{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;border:none;background:transparent;color:var(--ink);font-size:28px;font-weight:300;cursor:pointer}
  .searchrow{display:flex;gap:10px;align-items:center;margin-bottom:18px}
  .search{flex:1;height:44px;border-radius:22px;background:var(--card);display:flex;align-items:center;gap:10px;padding:0 16px;color:var(--muted)}
  .search input{flex:1;border:0;background:transparent;outline:0;color:var(--ink);font-size:16px;font-family:inherit}
  .filter{width:44px;height:44px;border-radius:22px;display:grid;place-items:center;background:transparent;border:none;cursor:pointer}
  .list{display:flex;flex-direction:column;gap:14px}
  .card{position:relative;border-radius:22px;padding:22px;color:var(--ink);overflow:hidden;cursor:pointer;transition:transform .12s}
  .card:active{transform:scale(.985)}
  .card h3{margin:0;font-size:28px;font-weight:700;letter-spacing:-.01em;line-height:1}
  .pct{position:absolute;top:22px;right:22px;font-size:14px;font-weight:500;opacity:.8}
  .meta{display:flex;align-items:center;gap:8px;margin-top:14px}
  .pill{display:inline-flex;align-items:center;padding:8px 14px;border-radius:999px;border:1px solid rgba(0,0,0,.28);font-size:13px;font-weight:500;color:var(--ink)}
  .go{margin-left:auto;width:38px;height:38px;border-radius:50%;background:#111;color:#fff;display:grid;place-items:center;border:none}
  .card.dark{color:#fff}
  .card.dark .pill{border-color:rgba(255,255,255,.7);color:#fff}
  .card.dark .pct{color:#fff;opacity:.9}
  .tabbar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:8px 12px calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;z-index:30}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:0;color:var(--muted);font-size:11px;padding:6px 4px;cursor:pointer;font-family:inherit}
  .tab.active{color:var(--ink)}
  .tab-view{display:none}
  .tab-view.active{display:block}
  .screen{position:fixed;inset:0;background:#fff;z-index:40;transform:translateX(100%);transition:transform .28s ease;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .screen.open{transform:translateX(0)}
  .shead{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
  .back{width:40px;height:40px;border-radius:50%;background:var(--card);border:0;display:grid;place-items:center}
  .flash-wrap{flex:1;display:flex;flex-direction:column;padding:20px;gap:14px}
  .flash{flex:1;min-height:340px;border-radius:28px;padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative}
  .flash .word{font-size:44px;font-weight:700;letter-spacing:-.02em;margin:0 0 10px}
  .flash .ipa{font-size:18px;color:var(--muted);margin-bottom:18px}
  .flash .translate{font-size:20px;font-weight:500}
  .flash .example{margin-top:22px;font-size:15px;line-height:1.5;opacity:.75;max-width:90%}
  .flash .count{position:absolute;top:18px;right:22px;font-size:14px;opacity:.65}
  .flash.dark{color:#fff}
  .actions{display:flex;gap:12px}
  .act{flex:1;height:54px;border-radius:18px;border:0;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer}
  .act.skip{background:var(--card);color:var(--ink)}
  .act.know{background:#0a0a0a;color:#fff}
  .hint{text-align:center;color:var(--muted);font-size:13px}
  @media (prefers-color-scheme:dark){
    :root{--bg:#0b0b0c;--ink:#fafafa;--muted:#9a9a9a;--card:#1b1b1d;--line:#24242a}
    .tabbar{background:#0b0b0c}.screen{background:#0b0b0c}.card h3{color:#0a0a0a}.card.dark h3{color:#fff}
  }
</style></head>
<body>
<div id="home" class="tab-view active app">
  <div class="head"><div class="title">My collections</div><button class="add" id="addBtn">+</button></div>
  <div class="searchrow">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input id="searchInput" placeholder="Search" />
    </div>
    <button class="filter"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.8"/><circle cx="17" cy="17" r="2" stroke="currentColor" stroke-width="1.8"/><path d="M9 7h11M4 17h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
  </div>
  <div class="list" id="list"></div>
</div>
<div id="detail" class="screen">
  <div class="shead"><button class="back" id="dBack"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6 9 12l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button><div id="dTitle"></div><div style="width:40px"></div></div>
  <div class="flash-wrap">
    <div class="flash" id="flash">
      <div class="count" id="fCount"></div>
      <div class="word" id="fWord"></div>
      <div class="ipa" id="fIpa"></div>
      <div class="translate" id="fTranslate" style="display:none"></div>
      <div class="example" id="fExample" style="display:none"></div>
    </div>
    <div class="actions"><button class="act skip" id="fSkip">Skip</button><button class="act know" id="fKnow">Tap to reveal</button></div>
    <div class="hint">Tap card to flip · Next to advance</div>
  </div>
</div>
<nav class="tabbar">
  <button class="tab" data-t="home"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 4h10a3 3 0 0 1 3 3v14l-4-2-4 2-4-2-4 2V7a3 3 0 0 1 3-3Z" stroke="currentColor" stroke-width="1.6"/></svg><span>Vocabulary</span></button>
  <button class="tab" data-t="home"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M9 4v16M15 4v16" stroke="currentColor" stroke-width="1.6"/></svg><span>Library</span></button>
  <button class="tab active" data-t="home"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="m3 11 9-7 9 7v9a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1v-9Z" stroke="currentColor" stroke-width="1.6"/></svg><span>Home</span></button>
  <button class="tab" data-t="home"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H8l-4 4V5Z" stroke="currentColor" stroke-width="1.6"/></svg><span>Chat</span></button>
  <button class="tab" data-t="home"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M4 21c1.5-4 4.5-6 8-6s6.5 2 8 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg><span>Profile</span></button>
</nav>
<script>
  const tg = window.Telegram?.WebApp; tg?.ready(); tg?.expand();
  const COLL = [
    { name:'Social issues', level:'Pre-intermediate', color:'#c9b3ff', progress:23, words:48 },
    { name:'Museum', level:'Intermediate', color:'#c9e870', progress:78, words:26 },
    { name:'Daily life', level:'Elementary', color:'#3f5fd9', progress:98, words:167, dark:true },
    { name:'Food', level:'Pre-intermediate', color:'#e85a3b', progress:100, words:96, dark:true },
    { name:'Music', level:'Intermediate', color:'#d7b9ff', progress:92, words:54 },
  ];
  const WORDS = [
    ['community','/kəˈmjuːnəti/','a group of people living in one area','A strong community supports its members.'],
    ['volunteer','/ˌvɒlənˈtɪə/','someone who works without being paid','She volunteers at the shelter.'],
    ['protest','/ˈprəʊtest/','a public expression of disagreement','Thousands joined the protest.'],
  ];
  const list = document.getElementById('list');
  let cur, idx=0, flipped=false;
  function render(q=''){
    list.innerHTML = COLL.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())).map(c=>`
      <div class="card ${c.dark?'dark':''}" style="background:${c.color}" data-n="${c.name}">
        <span class="pct">${c.progress}%</span>
        <h3>${c.name}</h3>
        <div class="meta">
          <span class="pill">${c.level}</span>
          <span class="pill">${c.words} words</span>
          <button class="go"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        </div>
      </div>`).join('');
    list.querySelectorAll('.card').forEach(el => el.addEventListener('click', ()=>open(el.dataset.n)));
  }
  function open(name){ cur = COLL.find(c=>c.name===name); idx=0; flipped=false;
    document.getElementById('dTitle').textContent = name;
    document.getElementById('flash').style.background = cur.color;
    document.getElementById('flash').classList.toggle('dark', !!cur.dark);
    paint(); document.getElementById('detail').classList.add('open'); tg?.BackButton?.show?.();
  }
  function paint(){
    const w = WORDS[idx % WORDS.length];
    document.getElementById('fCount').textContent = `${idx+1} / ${WORDS.length}`;
    document.getElementById('fWord').textContent = w[0];
    document.getElementById('fIpa').textContent = w[1];
    document.getElementById('fTranslate').textContent = w[2];
    document.getElementById('fExample').textContent = w[3];
    document.getElementById('fTranslate').style.display = flipped ? 'block':'none';
    document.getElementById('fExample').style.display = flipped ? 'block':'none';
    document.getElementById('fKnow').textContent = flipped ? 'I know it':'Tap to reveal';
  }
  document.getElementById('flash').addEventListener('click', ()=>{flipped=!flipped; paint();});
  document.getElementById('fKnow').addEventListener('click', e=>{e.stopPropagation(); if(!flipped){flipped=true;paint();return;} idx=(idx+1)%WORDS.length; flipped=false; paint();});
  document.getElementById('fSkip').addEventListener('click', e=>{e.stopPropagation(); idx=(idx+1)%WORDS.length; flipped=false; paint();});
  document.getElementById('dBack').addEventListener('click', ()=>{document.getElementById('detail').classList.remove('open'); tg?.BackButton?.hide?.();});
  tg?.BackButton?.onClick?.(()=>document.getElementById('detail').classList.remove('open'));
  document.getElementById('searchInput').addEventListener('input', e=>render(e.target.value));
  render();
</script></body></html>
