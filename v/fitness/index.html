<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>Fitness</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#000;--card:#1c1c1e;--card2:#2c2c2e;--ink:#fff;--ink2:#c7c7cc;--muted:#8e8e93;--move:#fa114f;--exercise:#92e82a;--stand:#1ad0e0;--steps:#cb9cff;--distance:#00c7ff;--lime:#c6ff3a}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100dvh;padding:env(safe-area-inset-top) 0 calc(100px + env(safe-area-inset-bottom))}
  .app{max-width:480px;margin:0 auto;padding:8px 16px 24px}
  .head{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 4px 18px}
  .title-h{font-size:34px;font-weight:700;letter-spacing:-.02em;line-height:1;margin:0}
  .subtitle{font-size:17px;color:var(--muted);margin-top:4px}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7f6bbd,#3a2d6e);display:grid;place-items:center;font-weight:600;font-size:14px;margin-top:6px}
  .info-card{background:var(--card);border-radius:18px;padding:22px;margin-bottom:18px;position:relative}
  .info-head{display:flex;gap:14px;align-items:flex-start}
  .bullseye{width:46px;height:46px;color:#8e8e93;flex:0 0 auto}
  .info-title{font-size:22px;font-weight:700;margin:0 32px 6px 0;line-height:1.2}
  .info-body{font-size:17px;line-height:1.35;color:var(--ink2);margin:14px 0 0}
  .close{position:absolute;top:18px;right:18px;width:28px;height:28px;border-radius:50%;background:var(--card2);border:0;color:var(--muted);display:grid;place-items:center}
  .edit-btn{width:100%;height:56px;border-radius:28px;background:#545458;color:var(--lime);font-size:19px;font-weight:600;font-family:inherit;border:0;margin-top:22px;cursor:pointer}
  .rings-card{background:var(--card);border-radius:18px;padding:22px;margin-bottom:18px}
  .rings-title{font-size:22px;font-weight:700;margin:0 0 18px}
  .rings-body{display:flex;align-items:center;gap:22px}
  .rings-svg{width:170px;height:170px;flex:0 0 auto}
  .ring-labels{display:flex;flex-direction:column;gap:22px;font-size:22px;font-weight:500}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  .tile{background:var(--card);border-radius:18px;padding:18px 16px 12px;min-height:170px;position:relative;cursor:pointer}
  .tile h4{margin:0 30px 10px 0;font-size:19px;font-weight:700}
  .tile .chev{position:absolute;top:18px;right:16px;width:22px;height:22px;border-radius:50%;background:var(--card2);display:grid;place-items:center;color:var(--muted)}
  .tile .label{font-size:15px;color:var(--ink2);margin-bottom:4px}
  .tile .value{font-size:28px;font-weight:700;line-height:1}
  .tile .value .unit{font-size:16px;font-weight:600;margin-left:2px}
  .bars{display:flex;align-items:flex-end;gap:1px;height:40px;margin-top:14px;padding-top:6px;border-bottom:1px solid rgba(255,255,255,.15)}
  .bar{flex:1;background:rgba(255,255,255,.22);border-radius:1px}
  .axis{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-top:4px}
  .c-steps{color:var(--steps)}.c-dist{color:var(--distance)}
  .tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom));background:#1c1c1e;border-radius:36px;padding:8px 10px;display:flex;gap:2px;box-shadow:0 12px 28px rgba(0,0,0,.45);z-index:40;max-width:94%}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:24px;background:transparent;border:0;color:var(--muted);font-size:11px;font-family:inherit;min-width:72px}
  .tab.active{background:#2c2c2e;color:var(--lime)}
</style></head>
<body>
<div class="app">
  <div class="head"><div><h1 class="title-h">Summary</h1><div class="subtitle" id="dateSub"></div></div><div class="avatar" id="avatar">AG</div></div>
  <div class="info-card">
    <button class="close" onclick="this.parentElement.remove()"><svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
    <div class="info-head">
      <svg class="bullseye" viewBox="0 0 46 46" fill="none"><circle cx="23" cy="23" r="21" stroke="currentColor" stroke-width="2"/><circle cx="23" cy="23" r="14" stroke="currentColor" stroke-width="2"/><circle cx="23" cy="23" r="7" stroke="currentColor" stroke-width="2"/><circle cx="23" cy="23" r="2" fill="currentColor"/></svg>
      <div><h3 class="info-title">A Customizable Summary</h3></div>
    </div>
    <p class="info-body">You can make your Summary tab your own, with custom views of everything from your distance totals and average pace to expanded views of trends and tips.</p>
    <button class="edit-btn">Edit Your Summary</button>
  </div>
  <div class="rings-card"><h3 class="rings-title">Activity Rings</h3>
    <div class="rings-body">
      <svg class="rings-svg" viewBox="0 0 170 170">
        <circle cx="85" cy="85" r="68" stroke="rgba(250,17,79,.22)" stroke-width="16" fill="none"/>
        <circle cx="85" cy="85" r="50" stroke="rgba(146,232,42,.22)" stroke-width="16" fill="none"/>
        <circle cx="85" cy="85" r="32" stroke="rgba(26,208,224,.22)" stroke-width="16" fill="none"/>
        <circle cx="85" cy="85" r="68" stroke="var(--move)" stroke-width="16" fill="none" stroke-linecap="round" stroke-dasharray="20 999" transform="rotate(-90 85 85)"/>
        <circle cx="85" cy="85" r="50" stroke="var(--exercise)" stroke-width="16" fill="none" stroke-linecap="round" stroke-dasharray="15 999" transform="rotate(-90 85 85)"/>
        <circle cx="85" cy="85" r="32" stroke="var(--stand)" stroke-width="16" fill="none" stroke-linecap="round" stroke-dasharray="10 999" transform="rotate(-90 85 85)"/>
        <g fill="#000" font-size="10" font-weight="700" text-anchor="middle"><text x="85" y="20">→</text><text x="85" y="38">»</text><text x="85" y="56">↑</text></g>
      </svg>
      <div class="ring-labels"><div>Move</div><div>Exercise</div><div>Stand</div></div>
    </div>
  </div>
  <div class="tiles">
    <div class="tile"><div class="chev"><svg width="10" height="10" viewBox="0 0 10 10"><path d="m3 1 4 4-4 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></div>
      <h4>Step Count</h4><div class="label">Today</div><div class="value c-steps">0</div>
      <div class="bars" id="bars1"></div><div class="axis"><span>0</span><span>6</span><span>12</span><span>18</span></div>
    </div>
    <div class="tile"><div class="chev"><svg width="10" height="10" viewBox="0 0 10 10"><path d="m3 1 4 4-4 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></div>
      <h4>Step Distance</h4><div class="label">Today</div><div class="value c-dist">0.00<span class="unit">KM</span></div>
      <div class="bars" id="bars2"></div><div class="axis"><span>0</span><span>6</span><span>12</span><span>18</span></div>
    </div>
  </div>
</div>
<nav class="tabbar">
  <button class="tab active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/></svg><span>Summary</span></button>
  <button class="tab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="8" cy="10" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M14 10h8M18 7v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg><span>Fitness+</span></button>
  <button class="tab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="6" r="1.5" stroke="currentColor" stroke-width="1.6"/><path d="M7 21l3-6 2 1 2-5 3 4 4-1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg><span>Workout</span></button>
  <button class="tab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="8" cy="9" r="3" stroke="currentColor" stroke-width="1.6"/><circle cx="17" cy="10" r="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M2 20c1-3 3.5-5 6-5s5 2 6 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg><span>Sharing</span></button>
</nav>
<script>
  const tg = window.Telegram?.WebApp; tg?.ready(); tg?.expand(); tg?.setHeaderColor?.('#000'); tg?.setBackgroundColor?.('#000');
  const today = new Date(), days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'], months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateSub').textContent = `${days[today.getDay()]}, ${today.getDate()} ${months[today.getMonth()]}`;
  [['bars1',10],['bars2',10]].forEach(([id,peak])=>{const el=document.getElementById(id); for(let i=0;i<48;i++){const b=document.createElement('div');b.className='bar';const h=today.getHours(),hour=(i/48)*24;b.style.height=hour>h?'0':Math.max(2,38*Math.exp(-Math.pow(hour-peak,2)/20)*(0.3+Math.random()*0.7))+'px';el.appendChild(b);}});
</script></body></html>
