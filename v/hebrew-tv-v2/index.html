<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Иврит TV · для русскоязычных</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body { min-height: 100vh; min-height: 100dvh; }

body {
  background: #0a0806;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  overflow-x: hidden;
  position: relative;
  padding: 20px 12px 40px;
  color: #e8e2d9;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  touch-action: manipulation;
}

button { font-family: inherit; border: none; background: none; color: inherit; cursor: pointer; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(156,124,94,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 80% at 20% 80%, rgba(46,61,79,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── TOP STRIP / STATS ───────────────────────────── */
.top-strip {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: calc(env(safe-area-inset-top, 0px) + 10px) 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(180deg, rgba(10,8,6,0.95), transparent);
  z-index: 50;
  font-family: 'VT323', monospace;
  color: rgba(200,191,173,0.6);
  font-size: 15px;
  letter-spacing: 0.12em;
  pointer-events: none;
}
.top-strip .stat {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  pointer-events: auto;
}
.top-strip .k { color: rgba(196,137,58,0.75); }

/* ── TV CABINET ───────────────────────────────────── */
.tv-wrap {
  position: relative;
  z-index: 10;
  filter: drop-shadow(0 40px 80px rgba(0,0,0,0.9)) drop-shadow(0 0 60px rgba(156,124,94,0.08));
  animation: tvFloat 6s ease-in-out infinite;
  max-width: 100%;
}
@keyframes tvFloat {
  0%,100% { transform: translateY(0px);   }
  50%      { transform: translateY(-10px); }
}

.tv-cabinet {
  background: linear-gradient(160deg, #3a2e22 0%, #2a2018 40%, #1e1710 100%);
  border-radius: 28px 28px 24px 24px;
  padding: 28px 32px 36px;
  position: relative;
  border: 2px solid #4a3828;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.08),
    inset 0 -4px 8px rgba(0,0,0,0.6),
    0 8px 0 #1a1208,
    0 12px 0 #140e06;
}
.tv-cabinet::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: repeating-linear-gradient(
    92deg,
    transparent 0px,
    transparent 18px,
    rgba(0,0,0,0.06) 18px,
    rgba(0,0,0,0.06) 19px
  );
  pointer-events: none;
}

/* ── SCREEN BEZEL ─────────────────────────────────── */
.tv-bezel {
  background: linear-gradient(145deg, #1a1410 0%, #0e0c08 100%);
  border-radius: 14px;
  padding: 18px;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.04),
    inset 4px 4px 12px rgba(0,0,0,0.8),
    inset -2px -2px 8px rgba(255,255,255,0.03);
  position: relative;
}

/* ── SCREEN ───────────────────────────────────────── */
.tv-screen {
  width: 520px;
  height: 390px;
  max-width: 100%;
  position: relative;
  overflow: hidden;
  border-radius: 8px;
  cursor: pointer;
  outline: none;
}
.tv-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 8px;
  box-shadow:
    inset  8px  0   20px rgba(0,0,0,0.35),
    inset -8px  0   20px rgba(0,0,0,0.35),
    inset  0    8px 20px rgba(0,0,0,0.25),
    inset  0   -8px 20px rgba(0,0,0,0.25);
  pointer-events: none;
  z-index: 20;
}
#screen {
  display: block;
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}
.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
  z-index: 15;
  border-radius: 8px;
  mix-blend-mode: multiply;
}
.phosphor-glow {
  position: absolute;
  inset: -2px;
  border-radius: 10px;
  pointer-events: none;
  z-index: 5;
  transition: box-shadow 1.2s ease;
}
.screen-glass {
  position: absolute;
  top: 6px; left: 8px;
  width: 45%; height: 30%;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.06) 0%,
    rgba(255,255,255,0.02) 50%,
    transparent 100%
  );
  border-radius: 6px 6px 0 0;
  pointer-events: none;
  z-index: 25;
}

/* ── CONTROLS BAR ─────────────────────────────────── */
.tv-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 20px;
  padding: 0 4px;
}
.tv-brand {
  font-family: 'VT323', monospace;
  font-size: 22px;
  color: rgba(200,191,173,0.35);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.knobs {
  display: flex;
  gap: 18px;
  align-items: center;
}
.knob {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #5a4535, #2a1e14);
  border: 2px solid #3a2a1c;
  box-shadow:
    0 3px 6px rgba(0,0,0,0.6),
    inset 0 1px 2px rgba(255,255,255,0.1);
  cursor: pointer;
  position: relative;
  transition: transform 0.15s ease;
}
.knob::after {
  content: '';
  position: absolute;
  top: 4px; left: 50%; transform: translateX(-50%);
  width: 3px; height: 10px;
  background: rgba(200,191,173,0.5);
  border-radius: 2px;
}
.knob:hover  { transform: rotate(30deg); }
.knob:active { transform: rotate(60deg); }
.knob.ch-knob { width: 38px; height: 38px; }
.knob.ch-knob::after { height: 12px; top: 5px; }
.knob.speaker {
  background: radial-gradient(circle at 35% 30%, #3a5a45, #1a2a20);
  border-color: #2a3a2c;
}
.knob.speaker::after {
  display: none;
}
.knob.speaker::before {
  content: '♪';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'VT323', monospace; font-size: 18px;
  color: rgba(200,191,173,0.7);
}

.indicator-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.led {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #c4893a;
  box-shadow: 0 0 6px #c4893a, 0 0 12px rgba(196,137,58,0.5);
  animation: ledPulse 2s ease-in-out infinite;
}
@keyframes ledPulse {
  0%,100% { opacity: 1;   }
  50%      { opacity: 0.4; }
}

/* ── CHANNEL STRIP ────────────────────────────────── */
.channel-strip {
  display: flex;
  gap: 8px;
  margin-top: 22px;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 590px;
}
.ch-btn {
  width: 44px; height: 30px;
  border: 1px solid rgba(200,191,173,0.15);
  background: rgba(255,255,255,0.03);
  border-radius: 4px;
  color: rgba(200,191,173,0.5);
  font-family: 'VT323', monospace;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}
.ch-btn:hover {
  border-color: rgba(200,191,173,0.4);
  color: rgba(232,226,217,0.9);
  transform: translateY(-1px);
}
.ch-btn.active {
  border-color: var(--ch-color, #c4893a);
  color: #e8e2d9;
  box-shadow: 0 0 10px var(--ch-color, #c4893a), inset 0 0 8px rgba(255,255,255,0.05);
}
.ch-btn.learned::after {
  content: '•';
  position: absolute;
  top: -4px; right: 2px;
  color: rgba(196,137,58,0.9);
  font-size: 18px;
}

/* ── HINT ─────────────────────────────────────────── */
.hint {
  margin-top: 16px;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(200,191,173,0.22);
  text-align: center;
  max-width: 520px;
  line-height: 1.6;
}

/* ── BOTTOM ACTIONS ───────────────────────────────── */
.bottom-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.bottom-actions .ba {
  border: 1px solid rgba(200,191,173,0.2);
  background: rgba(255,255,255,0.03);
  border-radius: 4px;
  padding: 8px 14px;
  color: rgba(200,191,173,0.55);
  font-family: 'VT323', monospace;
  font-size: 15px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.bottom-actions .ba:hover {
  border-color: rgba(196,137,58,0.6);
  color: #e8e2d9;
}

/* ── CHANNEL SWITCH ANIMATION ─────────────────────── */
.tv-screen.switching #screen {
  animation: crtSwitch 0.45s ease forwards;
}
@keyframes crtSwitch {
  0%   { transform: scaleY(1);    filter: brightness(1.2);          }
  20%  { transform: scaleY(0.02); filter: brightness(3) blur(1px);  }
  55%  { transform: scaleY(0.02); filter: brightness(0.1);           }
  75%  { transform: scaleY(1.04); filter: brightness(1.4);           }
  90%  { transform: scaleY(0.97); filter: brightness(0.9);           }
  100% { transform: scaleY(1);    filter: brightness(1);             }
}

/* ── POWER-ON BLOOM ──────────────────────────────── */
.bloom {
  position: absolute; inset: 0; z-index: 30;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.5), transparent 60%);
  opacity: 0;
  pointer-events: none;
  border-radius: 8px;
}
.tv-screen.switching .bloom { animation: bloomPulse 0.45s ease forwards; }
@keyframes bloomPulse {
  0%   { opacity: 0; }
  25%  { opacity: 0.9; }
  100% { opacity: 0; }
}

@media (max-width: 640px) {
  .tv-screen  { width: 320px; height: 240px; }
  .tv-cabinet { padding: 16px 18px 24px; }
  .ch-btn     { width: 36px; height: 26px; font-size: 14px; }
  .tv-brand { font-size: 18px; }
  .top-strip { font-size: 13px; }
}

/* ── TOAST ─────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(26,20,16,0.95);
  border: 1px solid rgba(196,137,58,0.5);
  color: #e8e2d9;
  padding: 10px 18px;
  border-radius: 4px;
  font-family: 'VT323', monospace;
  font-size: 15px;
  letter-spacing: 0.1em;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(196,137,58,0.25);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── COMPLETION CELEBRATION ─────────────────────── */
.spark {
  position: fixed;
  pointer-events: none;
  font-size: 24px;
  z-index: 400;
  animation: sparkUp 1.2s ease-out forwards;
}
@keyframes sparkUp {
  from { opacity: 1; transform: translateY(0) scale(0.4); }
  60% { opacity: 1; }
  to { opacity: 0; transform: translateY(-160px) scale(1.1); }
}
</style>
</head>
<body>

<div class="top-strip">
  <div class="stat">🔥 <span class="k" id="streak-n">0</span></div>
  <div class="stat">СЛОВ <span class="k" id="learned-n">0</span>/<span id="total-n">0</span></div>
  <div class="stat">XP <span class="k" id="xp-n">0</span></div>
</div>

<div class="tv-wrap">
  <div class="tv-cabinet">
    <div class="tv-bezel">
      <div class="tv-screen" id="tvScreen" tabindex="0">
        <canvas id="screen"></canvas>
        <div class="scanlines"></div>
        <div class="phosphor-glow" id="glow"></div>
        <div class="screen-glass"></div>
        <div class="bloom"></div>
      </div>
    </div>

    <div class="tv-controls">
      <div class="tv-brand">IVRIT · TV</div>
      <div class="indicator-row">
        <div class="led"></div>
        <span style="font-family:'VT323',monospace;font-size:14px;color:rgba(200,191,173,0.3);letter-spacing:0.1em;">ON AIR</span>
      </div>
      <div class="knobs">
        <div class="knob speaker" id="speakerKnob" title="Повторить слово"></div>
        <div class="knob" id="prevKnob" title="Предыдущий канал"></div>
        <div class="knob ch-knob" id="nextKnob" title="Следующий канал"></div>
      </div>
    </div>
  </div>

  <div class="channel-strip" id="channelStrip"></div>

  <div class="bottom-actions">
    <button class="ba" id="btn-share">🔥 Поделиться</button>
    <button class="ba" id="btn-pro">⭐ PRO</button>
    <button class="ba" id="btn-reset">⟲ Сброс</button>
  </div>

  <div class="hint">Тап по экрану — повторить слово · ручка / пробел / стрелки — следующий канал · цифры 1–9 — прямой выбор</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// Telegram init
// ============================================================
const tg = window.Telegram?.WebApp;
const tgUser = tg?.initDataUnsafe?.user;
if (tg) {
  try {
    tg.ready();
    tg.expand();
    tg.setHeaderColor?.('#0a0806');
    tg.setBackgroundColor?.('#0a0806');
    tg.setBottomBarColor?.('#0a0806');
    tg.disableVerticalSwipes?.();
    tg.enableClosingConfirmation?.();
    tg.SettingsButton?.show?.();
  } catch {}
}
const haptic = (t='light') => { try { tg?.HapticFeedback?.impactOccurred(t); } catch {} };
const notify = (t) => { try { tg?.HapticFeedback?.notificationOccurred(t); } catch {} };
const select = () => { try { tg?.HapticFeedback?.selectionChanged(); } catch {} };

// ============================================================
// Storage
// ============================================================
const storage = {
  get(k) {
    return new Promise((r) => {
      if (tg?.CloudStorage?.getItem) {
        tg.CloudStorage.getItem(k, (err, val) => {
          if (err || !val) { try { r(localStorage.getItem(k)); } catch { r(null); } }
          else r(val);
        });
      } else { try { r(localStorage.getItem(k)); } catch { r(null); } }
    });
  },
  set(k, v) {
    try { localStorage.setItem(k, v); } catch {}
    if (tg?.CloudStorage?.setItem) tg.CloudStorage.setItem(k, v, () => {});
  }
};

// ============================================================
// Channels — Hebrew words as TV channels
// ============================================================
const CHANNELS = [
  { ch:  1, he: 'שָׁלוֹם',    tr: 'shalom',    ru: 'здравствуй · мир',  cat: 'приветствие',    hex: '#c4893a', r:196, g:137, b:58,  note: 'универсальное — и «здравствуй», и «до свидания»', ex: 'שָׁלוֹם, מָה נִשְׁמָע?' },
  { ch:  2, he: 'תּוֹדָה',     tr: 'toda',      ru: 'спасибо',            cat: 'вежливость',     hex: '#d4a5a0', r:212, g:165, b:160, note: 'можно добавить רַבָּה — большое',              ex: 'תּוֹדָה רַבָּה!' },
  { ch:  3, he: 'בְּבַקָּשָׁה', tr: 'bevakasha', ru: 'пожалуйста',         cat: 'вежливость',     hex: '#8fafc2', r:143, g:175, b:194, note: 'и «прошу», и ответ на благодарность',          ex: 'בְּבַקָּשָׁה, הַקָּפֶה שֶׁלְּךָ' },
  { ch:  4, he: 'אֲנִי',       tr: 'ani',       ru: 'я',                  cat: 'местоимение',    hex: '#6b7f8e', r:107, g:127, b:142, note: 'одинаково для м. и ж. рода',                   ex: 'אֲנִי לוֹמֵד עִבְרִית' },
  { ch:  5, he: 'בַּיִת',      tr: 'bayit',     ru: 'дом',                cat: 'существительное',hex: '#9c7c5e', r:156, g:124, b:94,  note: 'м. род · мн. ч.: בָּתִּים (batim)',             ex: 'הַבַּיִת שֶׁלִּי גָּדוֹל' },
  { ch:  6, he: 'מַיִם',       tr: 'mayim',     ru: 'вода',               cat: 'существительное',hex: '#2e3d4f', r:46,  g:61,  b:79,  note: 'в иврите всегда во мн. числе',                 ex: 'אֲנִי שׁוֹתֶה מַיִם' },
  { ch:  7, he: 'אוֹהֵב',      tr: 'ohev',      ru: 'люблю · м. р.',      cat: 'глагол',         hex: '#4a5e45', r:74,  g:94,  b:69,  note: 'ж. род: אוֹהֶבֶת (ohevet)',                    ex: 'אֲנִי אוֹהֵב קָפֶה' },
  { ch:  8, he: 'יוֹם',        tr: 'yom',       ru: 'день',               cat: 'время',          hex: '#c8bfad', r:200, g:191, b:173, note: 'שָׁבוּעַ — неделя, 7 дней',                     ex: 'יוֹם טוֹב!' },
  { ch:  9, he: 'לַיְלָה',     tr: 'laila',     ru: 'ночь',               cat: 'время',          hex: '#1a1814', r:26,  g:24,  b:20,  note: 'לַיְלָה טוֹב — «спокойной ночи»',                ex: 'לַיְלָה טוֹב וְחֲלוֹמוֹת נְעִימִים' },
  { ch: 10, he: 'טוֹב',        tr: 'tov',       ru: 'хорошо · хороший',   cat: 'прилагательное', hex: '#e8e2d9', r:232, g:226, b:217, note: 'часто — ответ на «как дела»',                  ex: 'הַכֹּל בְּסֵדֶר, תּוֹדָה' },
  { ch: 11, he: 'אֶחָד',       tr: 'ekhad',     ru: 'один · м. р.',       cat: 'число',          hex: '#8a6a4a', r:138, g:106, b:74,  note: 'ж. род: אַחַת (akhat)',                        ex: 'יֶלֶד אֶחָד בַּחֶדֶר' },
  { ch: 12, he: 'סְלִיחָה',   tr: 'slikha',    ru: 'извините',           cat: 'вежливость',     hex: '#a8604e', r:168, g:96,  b:78,  note: 'и «извините», и «прошу прощения»',             ex: 'סְלִיחָה, אֵיפֹה הַתַּחֲנָה?' },
];

// ── CANVAS SETUP ─────────────────────────────────────────────────
const tvScreen = document.getElementById('tvScreen');
const canvas   = document.getElementById('screen');
const ctx      = canvas.getContext('2d');
const glow     = document.getElementById('glow');

let CW, CH;
function resizeCanvas() {
  const rect = tvScreen.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  CW = canvas.width  = rect.width  * dpr;
  CH = canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── STATE ─────────────────────────────────────────────────────────
const state = {
  currentCh: 0,
  xp: 0,
  streak: 0,
  lastActive: null,
  learned: [],
};

let staticNoise = null;
let noiseAge = 0;
let staticBurst = 0;
let switching = false;
let scanOffset = 0;
let glitchTimer = 0;
let ticker = 0;
let voices = [];

// ── BUILD CHANNEL BUTTONS ─────────────────────────────────────────
const strip = document.getElementById('channelStrip');
function buildStrip() {
  strip.innerHTML = '';
  CHANNELS.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn' + (i === state.currentCh ? ' active' : '') + (state.learned.includes(i) ? ' learned' : '');
    btn.textContent = String(ch.ch).padStart(2, '0');
    btn.style.setProperty('--ch-color', ch.hex);
    btn.addEventListener('click', () => switchTo(i));
    strip.appendChild(btn);
  });
}

function updateButtons(idx) {
  document.querySelectorAll('.ch-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    b.classList.toggle('learned', state.learned.includes(i));
  });
}

// ── PHOSPHOR GLOW ─────────────────────────────────────────────────
function setGlow(ch) {
  const { r, g, b } = ch;
  const brightness = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
  const a = 0.25 + brightness * 0.3;
  glow.style.boxShadow = `
    0 0 18px rgba(${r},${g},${b},${a}),
    0 0 45px rgba(${r},${g},${b},${a * 0.6}),
    0 0 90px rgba(${r},${g},${b},${a * 0.3})
  `;
}

// ── NOISE BUFFER ──────────────────────────────────────────────────
function makeNoiseBuffer() {
  const off = document.createElement('canvas');
  off.width = CW; off.height = CH;
  const oc = off.getContext('2d');
  const id = oc.createImageData(CW, CH);
  const d  = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255 | 0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  oc.putImageData(id, 0, 0);
  return off;
}

// ── DRAW SCREEN ───────────────────────────────────────────────────
function drawScreen(ch, staticAlpha) {
  const { r, g, b, hex, he, tr, ru, cat, note, ex, ch: chNum } = ch;
  ticker++;

  // Base
  ctx.fillStyle = hex;
  ctx.fillRect(0, 0, CW, CH);

  // Vignette
  const vg = ctx.createRadialGradient(CW/2, CH/2, CH*0.1, CW/2, CH/2, CH*0.72);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.40)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, CW, CH);

  // Phosphor warmth
  const luma = (r*0.299 + g*0.587 + b*0.114) / 255;
  const pgA = 0.10 + luma * 0.14;
  const pg = ctx.createRadialGradient(CW/2, CH/2, 0, CW/2, CH/2, CH*0.55);
  pg.addColorStop(0, `rgba(255,255,255,${pgA})`);
  pg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = pg;
  ctx.fillRect(0, 0, CW, CH);

  // Moving scanline band
  scanOffset = (scanOffset + 0.4) % CH;
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  for (let y = scanOffset % 80; y < CH; y += 80) {
    ctx.fillRect(0, y, CW, 2);
  }

  // Glitch line
  glitchTimer++;
  if (glitchTimer > 180 && Math.random() < 0.03) {
    glitchTimer = 0;
    const gy = Math.random() * CH | 0;
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.4})`;
    ctx.fillRect(0, gy, CW, (Math.random() * 3 + 1) | 0);
  }

  // Text palette based on luminance
  const dark = luma >= 0.55;
  const mainColor = dark ? 'rgba(26,24,20,0.92)' : 'rgba(232,226,217,0.96)';
  const subColor  = dark ? 'rgba(26,24,20,0.62)' : 'rgba(200,191,173,0.72)';
  const dimColor  = dark ? 'rgba(26,24,20,0.40)' : 'rgba(200,191,173,0.42)';
  const shadowCol = dark ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.30)';

  // Channel number — top left
  ctx.font = `${CW * 0.052}px 'VT323', monospace`;
  ctx.textAlign = 'left';
  ctx.fillStyle = dimColor;
  ctx.fillText(`CH ${String(chNum).padStart(2, '0')}`, CW*0.05, CW*0.075);

  // Category — top right
  ctx.font = `${CW * 0.035}px 'Share Tech Mono', monospace`;
  ctx.textAlign = 'right';
  ctx.fillStyle = dimColor;
  ctx.fillText(cat.toUpperCase(), CW - CW*0.05, CW*0.075);

  // Hebrew word — BIG centered (RTL)
  const heSize = CW * 0.18;
  ctx.font = `500 ${heSize}px 'Frank Ruhl Libre', 'David Libre', serif`;
  ctx.textAlign = 'center';
  ctx.direction = 'rtl';
  // shadow
  ctx.fillStyle = shadowCol;
  ctx.fillText(he, CW/2 + 3, CH*0.40 + 3);
  ctx.fillStyle = mainColor;
  ctx.fillText(he, CW/2, CH*0.40);
  ctx.direction = 'ltr';

  // Transliteration
  ctx.font = `${CW * 0.052}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = subColor;
  ctx.fillText(`/ ${tr} /`, CW/2, CH*0.56);

  // Russian meaning
  ctx.font = `${CW * 0.068}px 'VT323', monospace`;
  ctx.fillStyle = mainColor;
  ctx.fillText(ru.toUpperCase(), CW/2, CH*0.68);

  // Hebrew example (RTL, small serif)
  ctx.font = `500 ${CW * 0.045}px 'Frank Ruhl Libre', serif`;
  ctx.direction = 'rtl';
  ctx.fillStyle = subColor;
  ctx.fillText(ex, CW/2, CH*0.82);
  ctx.direction = 'ltr';

  // Note — small bottom
  ctx.font = `${CW * 0.032}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = dimColor;
  const noteLines = wrapText(note, CW * 0.9);
  noteLines.forEach((line, i) => {
    ctx.fillText(line, CW/2, CH*0.91 + i * CW * 0.04);
  });

  // Static overlay
  if (staticAlpha > 0.01) {
    if (!staticNoise || noiseAge++ > 3) {
      staticNoise = makeNoiseBuffer();
      noiseAge = 0;
    }
    ctx.globalAlpha = staticAlpha;
    ctx.drawImage(staticNoise, 0, 0);
    ctx.globalAlpha = 1;
  }
}

function wrapText(text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) { lines.push(cur); cur = w; }
    else cur = test;
  }
  if (cur) lines.push(cur);
  return lines.slice(0, 2);
}

// ── TTS ───────────────────────────────────────────────────────────
function loadVoices() { voices = speechSynthesis?.getVoices?.() || []; }
if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.addEventListener?.('voiceschanged', loadVoices);
}
function speakHe(text) {
  if (!('speechSynthesis' in window)) return false;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'he-IL';
    u.rate = 0.82;
    u.pitch = 1.0;
    const hv = voices.find(v => v.lang?.startsWith('he'));
    if (hv) u.voice = hv;
    speechSynthesis.speak(u);
    return true;
  } catch { return false; }
}

// ── SWITCH CHANNEL ────────────────────────────────────────────────
function switchTo(idx, silent=false) {
  if (switching) return;
  switching = true;
  state.currentCh = ((idx % CHANNELS.length) + CHANNELS.length) % CHANNELS.length;
  staticBurst = 1.0;

  updateButtons(state.currentCh);
  setGlow(CHANNELS[state.currentCh]);
  tvScreen.classList.add('switching');
  if (!silent) haptic('medium');

  setTimeout(() => { tvScreen.classList.remove('switching'); switching = false; }, 500);

  // TTS after a bit of static clears
  setTimeout(() => speakHe(CHANNELS[state.currentCh].he), 380);

  // Learn tracking
  markLearned(state.currentCh);

  // Persist channel
  storage.set('tv_ch', String(state.currentCh));
}

function markLearned(idx) {
  if (state.learned.includes(idx)) return;
  state.learned.push(idx);
  state.xp += 10;
  storage.set('tv_learned', JSON.stringify(state.learned));
  storage.set('tv_xp', String(state.xp));
  updateStreak();
  updateStats();
  updateButtons(state.currentCh);
  if (state.learned.length === CHANNELS.length) celebrateAll();
  tg?.sendData?.(JSON.stringify({ event: 'word', idx, xp: state.xp }));
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastActive !== today) {
    const yest = new Date(); yest.setDate(yest.getDate() - 1);
    if (state.lastActive === yest.toDateString()) state.streak += 1;
    else state.streak = 1;
    state.lastActive = today;
    storage.set('tv_streak', String(state.streak));
    storage.set('tv_lastActive', today);
    if (state.streak > 0 && (state.streak === 1 || state.streak === 3 || state.streak % 7 === 0)) {
      try { tg?.setEmojiStatus?.('🔥', { duration: 3600 }); } catch {}
    }
  }
}

function updateStats() {
  document.getElementById('streak-n').textContent = state.streak;
  document.getElementById('learned-n').textContent = state.learned.length;
  document.getElementById('total-n').textContent = CHANNELS.length;
  document.getElementById('xp-n').textContent = state.xp;
}

function celebrateAll() {
  notify('success');
  const n = 16;
  const em = ['🔥','⭐','✨','💫','🎉','✡︎'];
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.textContent = em[i % em.length];
    s.style.left = (Math.random() * 100) + '%';
    s.style.top = '60%';
    s.style.animationDelay = (i * 50) + 'ms';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1600);
  }
  tg?.sendData?.(JSON.stringify({ event: 'session_complete', mode: 'TV', words: CHANNELS.length }));
  if (tg?.showPopup) {
    tg.showPopup({
      title: '✡︎ Все каналы пройдены!',
      message: `Ты выучил ${CHANNELS.length} слов. Серия: ${state.streak} 🔥\nПоделиться в сторис?`,
      buttons: [
        { id: 'share', type: 'default', text: 'Поделиться' },
        { id: 'ok', type: 'default', text: 'Продолжить' },
      ]
    }, (id) => { if (id === 'share') shareRun(); });
  } else toast('Все каналы пройдены 🎉');
}

function next() { switchTo(state.currentCh + 1); }
function prev() { switchTo(state.currentCh - 1); }

// ── INPUT ─────────────────────────────────────────────────────────
document.getElementById('nextKnob').addEventListener('click', next);
document.getElementById('prevKnob').addEventListener('click', prev);
document.getElementById('speakerKnob').addEventListener('click', () => {
  haptic(); speakHe(CHANNELS[state.currentCh].he);
});
// Tap screen = replay audio (not advance)
tvScreen.addEventListener('click', () => { haptic(); speakHe(CHANNELS[state.currentCh].he); });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') { e.preventDefault(); prev(); }
  else if (e.key === 'Enter') { speakHe(CHANNELS[state.currentCh].he); }
  else {
    const n = parseInt(e.key);
    if (!isNaN(n) && n >= 1 && n <= 9) switchTo(n - 1);
    if (e.key === '0') switchTo(9);
  }
});

// Telegram BackButton cycles back
tg?.BackButton?.onClick?.(() => { haptic(); prev(); });
tg?.SettingsButton?.onClick?.(() => { haptic(); toast('Настройки · скоро'); });

// MainButton = next
try {
  if (tg?.MainButton) {
    tg.MainButton.setText('Следующий канал');
    tg.MainButton.setParams({ color: '#c4893a', text_color: '#0a0806' });
    tg.MainButton.show();
    tg.MainButton.onClick(() => { haptic(); next(); });
  }
} catch {}

// ── BOTTOM ACTIONS ────────────────────────────────────────────────
document.getElementById('btn-share').addEventListener('click', () => {
  haptic();
  shareRun();
});
function shareRun() {
  const text = `Учу иврит через ТВ-каналы 📺 · ${state.learned.length}/${CHANNELS.length} слов · серия ${state.streak}🔥`;
  try {
    if (tg?.shareToStory) {
      tg.shareToStory('https://goldberg2-habits.vercel.app', {
        text, widget_link: { url: 'https://t.me/Goldberg2bot', name: 'Иврит TV' }
      });
      notify('success');
      return;
    }
  } catch {}
  if (tg?.switchInlineQuery) tg.switchInlineQuery(text + ' — @Goldberg2bot', ['users','groups']);
  else toast(text);
}

document.getElementById('btn-pro').addEventListener('click', () => {
  haptic();
  fetch('/api/invoice', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ user_id: tgUser?.id }) })
    .then(r => r.json())
    .then(d => {
      if (d?.invoice_url && tg?.openInvoice) {
        tg.openInvoice(d.invoice_url, (s) => {
          if (s === 'paid') { notify('success'); toast('⭐ PRO разблокирован'); }
          else if (s === 'cancelled') toast('Отменено');
        });
      } else tg?.openTelegramLink?.('https://t.me/Goldberg2bot?start=pro') || toast('Откройте /pro в боте');
    })
    .catch(() => tg?.openTelegramLink?.('https://t.me/Goldberg2bot?start=pro') || toast('Откройте /pro в боте'));
});

document.getElementById('btn-reset').addEventListener('click', () => {
  haptic();
  if (tg?.showConfirm) tg.showConfirm('Сбросить прогресс?', ok => { if (ok) doReset(); });
  else if (confirm('Сбросить прогресс?')) doReset();
});
function doReset() {
  state.learned = []; state.xp = 0; state.streak = 0; state.lastActive = null;
  storage.set('tv_learned', '[]'); storage.set('tv_xp', '0'); storage.set('tv_streak', '0'); storage.set('tv_lastActive', '');
  updateStats(); updateButtons(state.currentCh);
  toast('Прогресс сброшен');
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastT;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── AUTO-ADVANCE (slow — 14s) ─────────────────────────────────────
let autoTimer = setInterval(() => { if (!document.hidden) next(); }, 14000);
tvScreen.addEventListener('click', () => {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => { if (!document.hidden) next(); }, 18000);
});

// ── RENDER LOOP ───────────────────────────────────────────────────
function loop() {
  staticBurst = staticBurst > 0.01 ? staticBurst * 0.82 : 0;
  drawScreen(CHANNELS[state.currentCh], staticBurst);
  requestAnimationFrame(loop);
}

// ── BOOT ──────────────────────────────────────────────────────────
(async () => {
  // restore state
  const [ch, xp, learned, streak, lastActive] = await Promise.all([
    storage.get('tv_ch'),
    storage.get('tv_xp'),
    storage.get('tv_learned'),
    storage.get('tv_streak'),
    storage.get('tv_lastActive'),
  ]);
  if (ch != null) state.currentCh = Math.max(0, Math.min(CHANNELS.length - 1, +ch));
  if (xp) state.xp = +xp || 0;
  if (streak) state.streak = +streak || 0;
  if (lastActive) state.lastActive = lastActive;
  if (learned) { try { state.learned = JSON.parse(learned) || []; } catch {} }

  buildStrip();
  setGlow(CHANNELS[state.currentCh]);
  updateStats();

  // wait for fonts before first draw
  try { await document.fonts?.ready; } catch {}
  resizeCanvas();
  loop();

  // first word after small delay
  setTimeout(() => { markLearned(state.currentCh); speakHe(CHANNELS[state.currentCh].he); }, 600);
})();
</script>
